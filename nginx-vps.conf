# ========================================================
# NGINX CONFIGURATION FOR VPS DEPLOYMENT
# (TesTicTour & Grimoire Internal Networking)
# ========================================================
#
# CÁCH LÀM:
# 1. Chạy lệnh: docker network create vps-net
# 2. cd tft/grimoire && docker-compose up -d
# 3. cd TesTicTour_V2 && docker-compose up -d
# 4. Copy file này ném vào /etc/nginx/sites-available/testictour
# 5. sudo ln -s /etc/nginx/sites-available/testictour /etc/nginx/sites-enabled/
# 6. sudo nginx -t
# 7. sudo systemctl reload nginx
#
# Đừng quên sửa testictour.com thành domain thực tế của bạn.

# ========================================================
# CLOUDFLARE REAL IP CONFIGURATION
# ========================================================
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

# ========================================================
# 1. CẤU HÌNH TESTICTOUR
# ========================================================

# Frontend của TesTicTour
server {
    listen 80;
    server_name testictour.com www.testictour.com; # Thay domain thực tế

    location / {
        proxy_pass http://127.0.0.1:3002;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# Backend (API) của TesTicTour
server {
    listen 80;
    server_name api.testictour.com;  # Thay domain thực tế

    location / {
        proxy_pass http://127.0.0.1:4000;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# ========================================================
# 2. CẤU HÌNH GRIMOIRE
# ========================================================

