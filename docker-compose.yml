services:
  # ─── Backend API (Express + Prisma + Socket.IO) ───
  backend:
    build:
      context: ./Testictour_be
      dockerfile: Dockerfile.backend
    container_name: testictour-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=https://testictour.com
      - BACKEND_SERVICE_URL=http://testictour-backend:4000
      - GRIMOIRE_API_URL=http://grimoire-backend:3001
      # Gateway Variables
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - MOMO_ENDPOINT=${MOMO_ENDPOINT}
      - MOMO_PARTNER_CODE=${MOMO_PARTNER_CODE}
      - MOMO_ACCESS_KEY=${MOMO_ACCESS_KEY}
      - MOMO_SECRET_KEY=${MOMO_SECRET_KEY}
      # Email (Resend)
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_WEBHOOK_SECRET=${RESEND_WEBHOOK_SECRET}
      - EMAIL_FROM_ADDRESS=${EMAIL_FROM_ADDRESS:-noreply@testictour.com}
      # Uncomment when Redis is available:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - vps-net

  # ─── Frontend (Next.js) ───
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
      args:
        - NEXT_PUBLIC_API_URL=https://api.testictour.com
        - NEXT_PUBLIC_BACKEND_URL=https://api.testictour.com
    container_name: testictour-frontend
    restart: unless-stopped
    # Nginx sẽ trỏ vào port 3002
    ports:
      - "3002:3000" 
    environment:
      # SSR (server-side) fetch — must use internal Docker service name, NOT public IP
      - BACKEND_URL=http://testictour-backend:4000
      - INTERNAL_BACKEND_URL=http://testictour-backend:4000/api
      # Client-side fetch — must use public domain accessible from browser
      - NEXT_PUBLIC_API_URL=https://api.testictour.com
      - NEXT_PUBLIC_BACKEND_URL=https://api.testictour.com
    depends_on:
      - backend
    networks:
      - vps-net

  # ─── Redis (Optional – uncomment when needed) ───
  redis:
    image: redis:7-alpine
    container_name: testictour-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - vps-net

  # ─── Worker (Optional – uncomment when Redis is enabled) ───
  worker:
    build:
      context: ./Testictour_be
      dockerfile: Dockerfile.backend
    container_name: testictour-worker
    restart: unless-stopped
    command: ["node", "dist/worker.js"]
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - BACKEND_SERVICE_URL=http://testictour-backend:4000
      # Email (Resend)
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_WEBHOOK_SECRET=${RESEND_WEBHOOK_SECRET}
      - EMAIL_FROM_ADDRESS=${EMAIL_FROM_ADDRESS:-noreply@testictour.com}
    depends_on:
      - backend
      - redis
    networks:
      - vps-net

networks:
  vps-net:
    external: true

volumes:
  redis-data:
